<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClearMoney — Financial Clarity</title>
    <meta name="description" content="Understand your money clearly. AI-powered financial insights for Indian millennials." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <script>
      // PDF.js from CDN — loaded before app so window.pdfjsLib is available
      window.pdfjsLib = null;
    </script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
      onload="window.pdfjsLib = pdfjsLib; pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';"
    ></script>
    <style>
      * { font-family: 'Inter', system-ui, sans-serif; }
      body { background-color: #FAFAFA; }

      @keyframes scoreRingFill {
        from { stroke-dashoffset: 565; }
        to   { stroke-dashoffset: var(--target-offset); }
      }
      .score-ring-path {
        animation: scoreRingFill 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }
      @keyframes countUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .count-up { animation: countUp 0.6s ease-out 0.3s both; }

      @keyframes staggerFade {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .stagger-1 { animation: staggerFade 0.5s ease-out 0.1s both; }
      .stagger-2 { animation: staggerFade 0.5s ease-out 0.2s both; }
      .stagger-3 { animation: staggerFade 0.5s ease-out 0.3s both; }
      .stagger-4 { animation: staggerFade 0.5s ease-out 0.4s both; }
      .stagger-5 { animation: staggerFade 0.5s ease-out 0.5s both; }
      .stagger-6 { animation: staggerFade 0.5s ease-out 0.6s both; }
      .stagger-7 { animation: staggerFade 0.5s ease-out 0.7s both; }
      .stagger-8 { animation: staggerFade 0.5s ease-out 0.8s both; }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .spinner { animation: spin 1s linear infinite; }

      @keyframes progressPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      .progress-pulse { animation: progressPulse 1.5s ease-in-out infinite; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

      .hide-scrollbar { scrollbar-width: none; }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
